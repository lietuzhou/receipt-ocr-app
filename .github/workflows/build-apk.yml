name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # 降级到22.04，兼容性更好
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # 强制使用指定NDK版本
      ANDROID_NDK_VERSION: 25b
      ANDROID_SDK_VERSION: 33

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 新增：缓存Buildozer依赖，加速打包
      - name: Cache Buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.local/share/python-for-android
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install cython==0.29.36 buildozer==1.5.0

      # 关键：手动设置NDK路径，避免冲突
      - name: Configure Android NDK/SDK
        run: |
          mkdir -p ~/.buildozer/android/platform
          ln -s /usr/local/lib/android/sdk/ndk/25b ~/.buildozer/android/platform/android-ndk-r25b
          ln -s /usr/local/lib/android/sdk ~/.buildozer/android/platform/android-sdk

      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: receipt-ocr-apk
          path: bin/*.apk
