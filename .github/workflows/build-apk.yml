name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          # 安装比原步骤更多的 build 相关依赖以避免 autoconf 报错
          sudo apt install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev \
            automake libtool-bin

      - name: Upgrade pip and install Python modules
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade buildozer cython

      - name: Remove old .buildozer (确保清爽，每次都是干净环境)
        run: rm -rf ~/.buildozer

      - name: Download Android commandline tools (最新版)
        run: |
          mkdir -p $HOME/.android/cmdline-tools
          cd $HOME/.android/cmdline-tools
          wget -O commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -o commandlinetools.zip
          mv cmdline-tools latest

      - name: Set environment variables for Android SDK
        run: |
          echo "ANDROID_SDK_ROOT=$HOME/.android" >> $GITHUB_ENV
          echo "$HOME/.android/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      # 如果工程根目录有 configure.ac，自动执行 autoupdate（大部分情况下可省略，仅在有 configure.ac 的依赖源码时触发）
      - name: Run autoupdate on configure.ac if exists
        run: if [ -f configure.ac ]; then autoupdate; fi

      - name: Build with Buildozer (自动下载安装 SDK/NDK)
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: receipt-ocr-apk
          path: |
            bin/*.apk
